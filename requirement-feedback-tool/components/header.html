<!-- 页面头部组件 -->
<header class="header">
    <div class="header-content">
        <a href="index.html" class="logo">内部产品需求反馈工具</a>
        <div class="header-actions">
            <a href="index.html" class="btn btn-outline">+ 提交需求</a>
            <button class="btn btn-secondary" onclick="exportData()">📥 导出</button>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">陈</div>
                <span id="userName">chenzhenwei01</span>
                <button class="btn btn-link" onclick="logout()" style="margin-left: 8px;">退出</button>
            </div>
        </div>
    </div>
</header>

<script>
    // 初始化用户信息
    document.addEventListener('DOMContentLoaded', function() {
        const userInfo = Utils.storage.get(Config.STORAGE_KEYS.USER_INFO);
        if (userInfo) {
            const avatar = document.getElementById('userAvatar');
            const name = document.getElementById('userName');
            if (avatar) avatar.textContent = userInfo.name.charAt(0);
            if (name) name.textContent = userInfo.name;
        }
    });

    // 导出功能
    function exportData() {
        window.location.href = 'export-modal.html';
    }

    // 退出登录
    function logout() {
        if (confirm('确定要退出登录吗？')) {
            Utils.storage.clear();
            window.location.href = 'login.html';
        }
    }
</script>
