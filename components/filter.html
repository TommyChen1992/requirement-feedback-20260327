<!-- 筛选组件 -->
<div class="filter-section">
    <div class="filter-row">
        <span class="filter-label">部门：</span>
        <select class="filter-select" id="filterDepartment">
            <option value="">全部部门</option>
        </select>

        <span class="filter-label">需求类型：</span>
        <select class="filter-select" id="filterType">
            <option value="">全部类型</option>
            <option value="feature_optimization">功能优化</option>
            <option value="bug_fix">Bug 修复</option>
            <option value="new_feature">新需求</option>
            <option value="experience_optimization">体验优化</option>
            <option value="other">其他</option>
        </select>

        <span class="filter-label">优先级：</span>
        <select class="filter-select" id="filterPriority">
            <option value="">全部优先级</option>
            <option value="P0">P0 - 紧急</option>
            <option value="P1">P1 - 高</option>
            <option value="P2">P2 - 中</option>
            <option value="P3">P3 - 低</option>
        </select>
    </div>

    <div class="filter-row">
        <span class="filter-label">时间范围：</span>
        <div class="date-range">
            <input type="date" class="date-input" id="startDate">
            <span>至</span>
            <input type="date" class="date-input" id="endDate">
        </div>

        <div class="search-box" style="margin-left: auto;">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索需求描述、反馈人、编号...">
            <button class="search-btn" onclick="searchRequirements()">搜索</button>
        </div>

        <button class="btn btn-secondary" onclick="resetFilters()" style="margin-left: 12px;">重置筛选</button>
    </div>
</div>

<script>
    // 加载部门列表
    async function loadDepartmentOptions() {
        try {
            let departments = [];
            if (typeof MockData !== 'undefined') {
                departments = MockData.departments;
            } else {
                const response = await Api.getDepartments();
                departments = response.data || [];
            }

            const select = document.getElementById('filterDepartment');
            if (select) {
                select.innerHTML = '<option value="">全部部门</option>';
                departments.forEach(dept => {
                    const option = document.createElement('option');
                    option.value = dept.id;
                    option.textContent = dept.name;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Load departments failed:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', loadDepartmentOptions);
</script>
